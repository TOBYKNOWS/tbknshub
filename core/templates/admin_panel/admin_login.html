<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – TBKNS HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0a0a0f; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; }
  .logo span { color: #ff4d00; }
  .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; }
  input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 0.8rem 1rem; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #ff4d00; }
  button { width: 100%; background: #ff4d00; border: none; color: #fff; padding: 0.85rem; border-radius: 6px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  .back { text-align: center; margin-top: 1rem; font-size: 0.82rem; color: rgba(255,255,255,0.35); }
  .back a { color: rgba(255,255,255,0.5); text-decoration: none; }
  .back a:hover { color: #fff; }
  .error { background: rgba(255,77,0,0.1); border: 1px solid rgba(255,77,0,0.3); border-radius: 6px; padding: 0.7rem 1rem; font-size: 0.85rem; color: #ff8866; margin-bottom: 1rem; }
</style>
</head>
<body>
<div style="text-align:center">
  <div class="logo" style="margin-bottom:2rem">TBKNS<span>.</span>HUB</div>
  <div class="card">
    <div style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:0.5rem">Admin Panel</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:1.5rem">Sign In</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="{% url 'admin_login' %}">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required autocomplete="off">
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Access Dashboard →</button>
    </form>
    <div class="back"><a href="{% url 'index' %}">← Back to website</a></div>
  </div>
  <p style="margin-top:1.5rem;font-size:0.75rem;color:rgba(255,255,255,0.2)">Default: admin / tbkns2024</p>
</div>
</body>
</html>
