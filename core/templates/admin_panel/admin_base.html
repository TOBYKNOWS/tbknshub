<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Dashboard{% endblock %} – TBKNS HUB Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --surface2: #1a1a2a;
    --border: rgba(255,255,255,0.07);
    --accent: #ff4d00;
    --accent2: #00d4aa;
    --text: #e8e8f0;
    --muted: rgba(255,255,255,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; min-height: 100vh; font-size: 0.9rem; }
  .syne { font-family: 'Syne', sans-serif; }

  /* ── Sidebar ── */
  .sidebar {
    width: 230px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
  }
  .sidebar-logo {
    padding: 1.5rem 1.5rem 1rem; font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 1.1rem; border-bottom: 1px solid var(--border);
  }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-label {
    padding: 1.2rem 1.5rem 0.4rem; font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.12em; color: rgba(255,255,255,0.2); font-weight: 600;
  }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
  .nav-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.65rem 1.5rem; font-size: 0.88rem; color: var(--muted);
    text-decoration: none; transition: all 0.15s; border-left: 2px solid transparent;
    cursor: pointer;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .nav-item.active { color: var(--accent); background: rgba(255,77,0,0.08); border-left-color: var(--accent); }
  .nav-item .icon { font-size: 1rem; width: 18px; text-align: center; }
  .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
  .sidebar-footer a { display: flex; align-items: center; gap: 0.6rem; font-size: 0.82rem; color: var(--muted); text-decoration: none; }
  .sidebar-footer a:hover { color: var(--text); }

  /* ── Main ── */
  .main { margin-left: 230px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Topbar ── */
  .topbar {
    height: 58px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; position: sticky; top: 0; z-index: 40;
  }
  .topbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .search-bar {
    display: flex; align-items: center; gap: 0.5rem;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.4rem 0.9rem; min-width: 200px;
  }
  .search-bar input { background: none; border: none; color: var(--text); font-size: 0.85rem; outline: none; width: 100%; }
  .search-bar input::placeholder { color: rgba(255,255,255,0.25); }
  .avatar {
    width: 32px; height: 32px; background: var(--accent);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700; cursor: pointer;
  }
  .notif-badge {
    width: 8px; height: 8px; background: var(--accent2);
    border-radius: 50%; position: absolute; top: -1px; right: -1px;
  }

  /* ── Content ── */
  .content { padding: 2rem; flex: 1; }

  /* ── Cards ── */
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.4rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
  .stat-card .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .stat-card .value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-top: 0.4rem; }
  .stat-card .change { font-size: 0.75rem; margin-top: 0.3rem; }
  .stat-card .icon-wrap {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    background: rgba(255,255,255,0.05);
  }

  /* ── Table ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 0.8rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
  .data-table td { padding: 0.9rem 1rem; font-size: 0.87rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .data-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── Badges ── */
  .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 100px; font-size: 0.72rem; font-weight: 600; }
  .badge-green { background: rgba(0,212,170,0.12); color: #00d4aa; }
  .badge-orange { background: rgba(255,165,0,0.12); color: #ffaa00; }
  .badge-blue { background: rgba(99,102,241,0.12); color: #818cf8; }
  .badge-red { background: rgba(255,77,77,0.12); color: #ff6b6b; }

  /* ── Panel ── */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .panel-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-header h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }
  .panel-body { padding: 1.5rem; }

  {% block extra_style %}{% endblock %}
  
</style>
</head>;;
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">TBKNS<span>.</span>HUB</div>
  <nav class="sidebar-nav">
    <div class="sidebar-label">Main</div>
    <a href="{% url 'admin_dashboard' %}" class="nav-item {% block nav_dashboard %}{% endblock %}">
      <span class="icon">⬛</span> Dashboard
    </a>
    <a href="{% url 'admin_projects' %}" class="nav-item {% block nav_projects %}{% endblock %}">
      <span class="icon">📁</span> Projects
    </a>
    <a href="{% url 'admin_clients' %}" class="nav-item {% block nav_clients %}{% endblock %}">
      <span class="icon">👥</span> Clients
    </a>
    <a href="{% url 'admin_team' %}" class="nav-item {% block nav_team %}{% endblock %}">
      <span class="icon">👥</span> Team
    </a>
    <a href="{% url 'admin_tasks' %}" class="nav-item {% block nav_tasks %}{% endblock %}">
      <span class="icon">✅</span> Tasks
    </a>
    <div class="sidebar-label">Finance</div>
    <a href="{% url 'admin_finance' %}" class="nav-item {% block nav_finance %}{% endblock %}">
      <span class="icon">💰</span> Finance
    </a>
    <div class="sidebar-label">Comms</div>
    <a href="{% url 'admin_messages' %}" class="nav-item {% block nav_messages %}{% endblock %}">
      <span class="icon">💬</span> Messages
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="{% url 'index' %}" target="_blank">🌐 View Website</a>
    <a href="{% url 'admin_logout' %}" style="margin-top:0.6rem">🚪 Logout</a>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
    <div style="display:flex;align-items:center;gap:1rem">
      <div class="search-bar">
        <span style="color:rgba(255,255,255,0.2)">🔍</span>
        <input type="text" placeholder="Search...">
      </div>
      <div style="position:relative">
        <div class="avatar">AD</div>
        <div class="notif-badge"></div>
      </div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
