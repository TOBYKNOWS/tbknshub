services:
  - type: web
    name: tbkns-hub
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn tbkns_hub.wsgi --log-file -
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: tbkns_hub.settings
      - key: DEBUG
        value: 'False'
      - key: SECRET_KEY
        value: your-secret-key-here
      - key: ALLOWED_HOSTS
        value: your-service-name.onrender.com
